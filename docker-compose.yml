name: leadar

services:
  cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
    container_name: leadar-cache
    restart: unless-stopped
    env_file: .env
    volumes:
      - dragonfly_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - leadar-network
    ulimits:
      memlock: -1
    cap_add:
      - SYS_NICE
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dragonfly_data:

networks:
  leadar-network:
    driver: bridge

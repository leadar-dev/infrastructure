name: leadar

services:
  cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
    container_name: leadar-cache
    restart: unless-stopped
    env_file: .env
    volumes:
      - dragonfly-data:/data
    ports:
      - "${DRAGONFLY_PORT:-6379}:6379"
    networks:
      - leadar-network
    ulimits:
      memlock: -1
    cap_add:
      - SYS_NICE
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/leadar-dev/backend:${VERSION:-latest}
    container_name: leadar-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - leadar-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cache:
        condition: service_healthy

  parser-kwork:
    image: ghcr.io/leadar-dev/parser-kwork:${VERSION:-latest}
    container_name: leadar-parser-kwork
    restart: unless-stopped
    networks:
      - leadar-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cache:
        condition: service_healthy

  telegram-bot:
    image: ghcr.io/leadar-dev/telegram-bot:${VERSION:-latest}
    container_name: leadar-telegram-bot
    restart: unless-stopped
    networks:
      - leadar-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cache:
        condition: service_healthy

volumes:
  dragonfly-data:

networks:
  leadar-network:
    driver: bridge
